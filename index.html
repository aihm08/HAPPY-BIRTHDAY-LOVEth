  function saveWish() {
  const wish = document.getElementById("wishBox").value;

  if (wish.trim() === "") {
    alert("✨ Write your wish first.");
    return;
  }

  localStorage.setItem("birthdayWish", wish);

  document.getElementById("wishMessage").innerHTML =
    "✨ Wish locked successfully. Don't tell anyone, or it might not come true. ♡";
  }

  function loadWish() {
  const savedWish = localStorage.getItem("birthdayWish");
  const box = document.getElementById("savedWishDisplay");

  if (savedWish) {
    box.innerHTML = `
      <p>🌸 Your Birthday Wish:</p>
      <p>${savedWish}</p>
    `;
  } else {
    box.innerHTML = "🫙 The wish jar is empty.";
  }
  }
    function updateCountdown() {
  const countdown = document.getElementById("countdown");
  if (!countdown) return;

  const now = new Date();

  // Next birthday: July 27, 12:00:00 AM
  let nextBirthday = new Date(now.getFullYear(), 6, 27, 0, 0, 0);

  // Kung lumagpas na ngayong taon, next year na
  if (now >= nextBirthday) {
    nextBirthday.setFullYear(nextBirthday.getFullYear() + 1);
  }

  const diff = nextBirthday.getTime() - now.getTime();

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  countdown.innerHTML = `
    ${days}d ${hours}h ${minutes}m ${seconds}s
    <br>
    I love you!! 🌸
  `;
}

// Run once immediately
updateCountdown();

// Then update every second
setInterval(updateCountdown, 1000);
  
let currentPage = 0;
  
function showPage() {
  document.getElementById("content").innerHTML = pages[currentPage];

  updateCountdown();

  document.getElementById("pageNum").innerText =
    `Page ${currentPage + 1} of ${pages.length}`;

  const title = document.getElementById("letterTitle");
title.style.display = currentPage === 0 ? "block" : "none";

  document.getElementById("prevBtn").style.visibility =
  currentPage === 0 ? "hidden" : "visible";

  document.getElementById("nextBtn").innerText =
    currentPage === pages.length - 1
      ? "♡ End of Letter ♡"
      : "Next →";
}

function nextPage() {
  if(currentPage < pages.length - 1){
    currentPage++;
    showPage();
  }
}

function prevPage() {
  if(currentPage > 0){
    currentPage--;
    showPage();
  }
}
function unlock() {
    const code = document.getElementById("code").value;

    if (code === "0727") {
        document.getElementById("login").style.display = "none";
        document.getElementById("letterPage").style.display = "flex";
        showPage();
    } else {
        alert("Wrong password.");
    }
}
